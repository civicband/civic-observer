{% load analytics %}
<div id="digest-form-container">
    <form hx-post="{% url 'notifications:digest-create' %}"
          hx-target="#digest-subscriptions"
          hx-swap="afterbegin"
          class="bg-gray-50 p-4 rounded-lg mb-4">
        {% csrf_token %}

        <div class="mb-4">
            <label for="id_municipality" class="block text-sm font-medium text-gray-700">Municipality</label>
            {{ form.municipality }}
            {% if form.municipality.errors %}
                <p class="mt-1 text-sm text-red-600">{{ form.municipality.errors.0 }}</p>
            {% endif %}
        </div>

        {% if form.non_field_errors %}
            <div class="mt-2 text-sm text-red-600">
                {{ form.non_field_errors.0 }}
            </div>
        {% endif %}

        <div class="flex justify-end gap-2">
            <button type="button"
                    hx-get="{% url 'notifications:digest-list' %}"
                    hx-target="#digest-form-container"
                    hx-swap="innerHTML"
                    class="px-4 py-2 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50">
                Cancel
            </button>
            <button type="submit"
                    class="px-4 py-2 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700"
                    data-umami-htmx-event="digest_subscription_created">
                Subscribe to Daily Digest
            </button>
        </div>
    </form>
</div>
