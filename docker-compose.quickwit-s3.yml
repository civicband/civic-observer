# Override file for testing Quickwit against Fastly S3 (staging bucket)
# Usage: docker compose -f docker-compose.yml -f docker-compose.quickwit-s3.yml up
#
# Prerequisites: .env must contain:
#   QUICKWIT_BUCKET=quickwit-civic-observer-staging
#   FASTLY_ACCESS_KEY_ID=...
#   FASTLY_SECRET_ACCESS_KEY=...
#   FASTLY_REGION=us-west

services:
  quickwit:
    environment:
      - QW_METASTORE_URI=s3://${QUICKWIT_BUCKET}/metastore
      - QW_DEFAULT_INDEX_ROOT_URI=s3://${QUICKWIT_BUCKET}/indexes
      - QW_S3_ENDPOINT=https://${FASTLY_REGION}.object.fastlystorage.app
      - AWS_ACCESS_KEY_ID=${FASTLY_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${FASTLY_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${FASTLY_REGION}
      - QW_LISTEN_ADDRESS=0.0.0.0
      - QW_ENABLE_OPENTELEMETRY=false
      - QW_ENABLE_JAEGER_EXPORTER=false
