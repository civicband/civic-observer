# Quickwit node configuration for S3-backed storage
# WARNING: S3 uploads in Quickwit 0.8 are broken in Docker due to Rusoto's
# async DNS resolver bug. Use docker-compose.quickwit-s3.yml with host networking
# if you need S3 storage.
#
# Required environment variables:
#   QW_S3_ENDPOINT (optional, for custom S3-compatible endpoints)
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_DEFAULT_REGION

version: 0.8

node_id: civic-observer-1
listen_address: 0.0.0.0

rest:
  listen_port: 7280
  cors_allow_origins:
    - "*"

data_dir: /quickwit/data

metastore:
  type: s3
  config:
    region: us-west

index_storage:
  type: s3
  config:
    region: us-west
