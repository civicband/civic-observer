# Quickwit node configuration for S3-backed metastore
# This file is mounted by docker-compose.quickwit-s3.yml
#
# Storage configuration is handled via environment variables:
#   QW_S3_ENDPOINT
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_DEFAULT_REGION

version: 0.8

node_id: civic-observer-1
listen_address: 0.0.0.0

rest:
  listen_port: 7280
  cors_allow_origins:
    - "*"

data_dir: /quickwit/data
