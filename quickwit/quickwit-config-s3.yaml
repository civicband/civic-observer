# Quickwit node configuration for S3-backed metastore
version: 0.8

node_id: civic-observer-1
listen_address: 0.0.0.0

rest:
  listen_port: 7280
  cors_allow_origins:
    - "*"

data_dir: /quickwit/data

storage:
  s3:
    endpoint: "https://us-west.object.fastlystorage.app"
    region: us-west
    force_path_style_access: true
