# Quickwit node configuration for S3-backed storage (Fastly Object Storage)
#
# Required environment variables:
#   QW_S3_ENDPOINT=https://${FASTLY_REGION:-us-west}.object.fastlystorage.app
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_DEFAULT_REGION=${FASTLY_REGION:-us-west}

version: 0.8

node_id: civic-observer-1
listen_address: 0.0.0.0

rest:
  listen_port: 7280
  cors_allow_origins:
    - "*"

data_dir: /quickwit/data

metastore:
  type: s3
  config:
    bucket: quickwit-civic-observer
    region: us-west

index_storage:
  type: s3
  config:
    bucket: quickwit-civic-observer
    region: us-west
