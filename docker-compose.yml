x-common-settings: &common-settings
    build:
      context: .
      dockerfile: ./Dockerfile
      target: release
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      quickwit:
        condition: service_started
    env_file: .env
    restart: on-failure
    volumes:
      - .:/src:cache

services:

  db:
    environment:
      - "POSTGRES_HOST_AUTH_METHOD=trust"
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "postgres", "-U", "postgres" ]
      interval: 10s
      timeout: 3s
      retries: 3
    image: "postgres:17-alpine"
    init: true
    ports:
      - "5433:5432"
    volumes:
      - .:/src:cache
      - postgres-data:/var/lib/postgresql/data/
      - ./docker/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf -c listen_addresses=*
    shm_size: 1gb

  redis:
    image: "redis:7-alpine"
    init: true
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis-data:/data
    restart: on-failure

  pgbouncer:
    image: edoburu/pgbouncer:latest
    init: true
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgres://postgres@db:5432/postgres
      - POOL_MODE=transaction
      - MAX_CLIENT_CONN=200
      - DEFAULT_POOL_SIZE=25
      - RESERVE_POOL_SIZE=5
    ports:
      - "6432:6432"
    volumes:
      - ./docker/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./docker/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    healthcheck:
      test: ["CMD", "psql", "-h", "localhost", "-p", "6432", "-U", "postgres", "-d", "postgres", "-c", "SELECT 1"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: on-failure

  quickwit:
    image: "quickwit/quickwit:0.8.1"
    init: true
    command: ["run"]
    # Commented out healthcheck to avoid DNS issues
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -O /dev/null -q http://localhost:7280/api/v1/health || exit 1"]
    #   interval: 5s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 15s
    environment:
      # File-backed metastore for dev (default — no S3 needed for local testing)
      # To test against Fastly S3 staging bucket, use:
      #   docker compose -f docker-compose.yml -f docker-compose.quickwit-s3.yml up
      # - QW_METASTORE_URI=file:///quickwit/data/metastore
      # - QW_DEFAULT_INDEX_ROOT_URI=file:///quickwit/data/indexes
      - QW_LISTEN_ADDRESS=0.0.0.0
      - QW_ENABLE_OPENTELEMETRY=false
      - QW_ENABLE_JAEGER_EXPORTER=false
      #
      # S3 metastore vars (set via docker-compose.quickwit-s3.yml override):
      #   QW_METASTORE_URI=s3://${QUICKWIT_BUCKET}/metastore
      #   QW_DEFAULT_INDEX_ROOT_URI=s3://${QUICKWIT_BUCKET}/indexes
      #   QW_S3_ENDPOINT=https://${FASTLY_REGION}.object.fastlystorage.app
      #   AWS_ACCESS_KEY_ID=${FASTLY_ACCESS_KEY_ID}
      #   AWS_SECRET_ACCESS_KEY=${FASTLY_SECRET_ACCESS_KEY}
      #   AWS_DEFAULT_REGION=${FASTLY_REGION}
    ports:
      - "7280:7280"
    volumes:
      - ./quickwit/index-config.yaml:/opt/quickwit/index-config.yaml:ro
      - quickwit-data:/quickwit/data
    restart: on-failure

  utility:
    <<: *common-settings
    tty: true

  web:
    <<: *common-settings
    command: uvicorn config.asgi:application --host 0.0.0.0
    entrypoint: ["/src/compose-entrypoint.sh"]
    init: true
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    ports:
      - "${DJANGO_PORT}:8000"
    tty: true

  worker:
    <<: *common-settings
    command: python manage.py rqworker default
    entrypoint: ["/src/compose-entrypoint.sh"]
    init: true
    tty: true

  tailwind:
    <<: *common-settings
    command: python manage.py tailwind watch
    init: true
    tty: true
    depends_on:
      - db

volumes:
  postgres-data:
  redis-data:
  meilisearch-data:
  quickwit-data:
